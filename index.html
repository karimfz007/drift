<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="The First Night — you wash ashore at dusk. Cold is coming." />
    <title>The First Night</title>
    <style>
        :root {
            --text: #f0ece4;
            --dim: #a9b6c6;
            --warm: #f0a860;
            --danger: #d9694a;
            --panel: rgba(9, 14, 22, 0.93);
            --edge: rgba(120, 140, 165, 0.35);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #05080f;
            overflow: hidden;
            /* A3: no pinch/zoom traps, no double-tap zoom, no pull-to-refresh. */
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            touch-action: none;
        }

        /* The UI layer is transparent to touch except where a control actually is. */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        #ui button { pointer-events: auto; }

        /* ---- HUD ---- */

        .hud { position: absolute; inset: 0; }

        /* Four compact vital bars, stacked top-left. */
        .vitals {
            position: absolute;
            top: calc(10px + var(--safe-top));
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
        }

        .vital { display: grid; grid-template-columns: 58px 1fr auto; align-items: center; gap: 7px; }
        .vital-name { font-size: 10px; letter-spacing: 0.12em; color: var(--dim); }

        .vital-bar {
            width: min(40vw, 190px);
            height: 11px;
            border: 1px solid var(--edge);
            border-radius: 3px;
            background: rgba(6, 10, 16, 0.6);
            overflow: hidden;
        }

        .vital-fill { height: 100%; width: 100%; transition: width 220ms linear, background 400ms linear; }
        .vital-label { font-size: 12px; color: var(--dim); min-width: 20px; }

        .hud-corner {
            position: absolute;
            top: calc(12px + var(--safe-top));
            right: 68px;
            text-align: right;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
        }
        .clock { font-size: 15px; font-weight: 700; color: var(--text); }

        /* The carried-inventory chip strip, below the vitals. */
        .inv {
            position: absolute;
            top: calc(84px + var(--safe-top));
            left: 12px;
            right: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .chip {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            background: rgba(9, 14, 22, 0.66);
            border: 1px solid var(--edge);
            border-radius: 5px;
            padding: 2px 7px;
        }
        .chip.tool { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }

        .hud-bottom {
            position: absolute;
            left: 0;
            right: 14px;
            bottom: calc(18px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .goal {
            font-size: 13px;
            color: var(--dim);
            background: rgba(6, 10, 16, 0.55);
            padding: 5px 10px;
            border-radius: 5px;
            max-width: 62vw;
            text-align: right;
        }

        .action {
            min-width: 168px;
            min-height: 56px;
            padding: 0 22px;
            font: inherit;
            font-size: 18px;
            font-weight: 700;
            color: var(--dim);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }

        .action.ready { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }
        .action:active { transform: scale(0.96); }

        .action-row { display: flex; align-items: flex-end; gap: 10px; }
        .secondary-action {
            min-width: 96px;
            min-height: 52px;
            padding: 0 16px;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }
        .secondary-action:active { transform: scale(0.96); }

        .settings-button {
            position: absolute;
            top: calc(14px + var(--safe-top));
            right: 14px;
            min-width: 62px;
            min-height: 44px;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            color: var(--dim);
            background: rgba(12, 20, 32, 0.7);
            border: 1px solid var(--edge);
            border-radius: 8px;
            opacity: 0.75;
        }

        .hint {
            position: absolute;
            left: 50%;
            bottom: calc(160px + var(--safe-bottom));
            transform: translateX(-50%) translateY(8px);
            max-width: 78vw;
            padding: 9px 14px;
            border-radius: 7px;
            background: rgba(9, 14, 22, 0.86);
            color: var(--warm);
            font-size: 15px;
            text-align: center;
            opacity: 0;
            transition: opacity 260ms ease, transform 260ms ease;
        }

        .hint.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- Virtual stick ---- */

        .stick-base, .stick-knob {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            margin-left: -39px;
            margin-top: -39px;
            width: 78px;
            height: 78px;
            transition: opacity 160ms ease;
            pointer-events: none;
        }

        .stick-base { border: 2px solid rgba(180, 200, 220, 0.5); background: rgba(10, 16, 26, 0.28); }

        .stick-knob {
            width: 46px;
            height: 46px;
            margin-left: -23px;
            margin-top: -23px;
            background: rgba(240, 236, 228, 0.7);
        }

        /* ---- Panels ---- */

        .panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 28px;
            box-sizing: border-box;
            background: var(--panel);
            text-align: center;
            opacity: 0;
            transition: opacity 300ms ease;
            pointer-events: auto;
        }

        .panel.visible { opacity: 1; }
        .panel.leaving { opacity: 0; }

        .panel h1 { font-size: clamp(30px, 9vw, 46px); letter-spacing: 0.14em; margin: 0; }
        .panel h2 { font-size: 25px; margin: 0; }
        .panel p { margin: 0; line-height: 1.55; font-size: 17px; }
        .panel .subtitle { color: var(--warm); font-size: 14px; }

        .panel .lines {
            text-align: left;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 6px 0 4px;
        }

        .panel .primary {
            margin-top: 10px;
            min-height: 56px;
            padding: 0 30px;
            font: inherit;
            font-size: 18px;
            font-weight: 700;
            color: #0c1420;
            background: var(--warm);
            border: 2px solid #ffe6a3;
            border-radius: 10px;
        }

        .panel .choices { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .panel .choices button {
            min-width: 104px;
            min-height: 56px;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }

        .panel .choices button.on { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }
        .panel .quiet {
            margin-top: 6px;
            min-height: 48px;
            padding: 0 22px;
            font: inherit;
            font-size: 15px;
            color: var(--dim);
            background: transparent;
            border: 1px solid var(--edge);
            border-radius: 9px;
        }
        .panel .primary[disabled] { opacity: 0.5; }
        .cold-open p, .death .subtitle { color: var(--dim); }

        /* Craft card gates. */
        .gates { display: flex; flex-direction: column; gap: 8px; width: min(320px, 80vw); }
        .gate {
            display: flex;
            justify-content: space-between;
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid var(--edge);
        }
        .gate.met { color: var(--good); border-color: rgba(143, 191, 122, 0.5); }
        .gate.unmet { color: var(--danger); }
        .death-count { color: var(--dim); font-size: 14px; }

        /* Level-up toast. */
        .level-toast {
            position: absolute;
            left: 50%;
            top: 30%;
            transform: translate(-50%, -8px);
            text-align: center;
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(9, 14, 22, 0.9);
            border: 1px solid var(--warm);
            color: var(--text);
            font-size: 17px;
            opacity: 0;
            transition: opacity 380ms ease, transform 380ms ease;
            pointer-events: none;
        }
        .level-toast.visible { opacity: 1; transform: translate(-50%, 0); }
        .level-toast strong { color: var(--warm); }
        .level-toast span { color: var(--dim); font-size: 13px; }

        /* ---- Transient feedback ---- */

        .float-text {
            position: absolute;
            left: 50%;
            top: 46%;
            transform: translate(-50%, 0);
            font-size: 19px;
            font-weight: 700;
            color: var(--warm);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
            animation: rise 900ms ease-out forwards;
            pointer-events: none;
        }

        @keyframes rise {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            18% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -46px); }
        }

        .ignition-flash {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 58%, rgba(255, 214, 140, 0.55), rgba(255, 150, 60, 0) 62%);
            animation: flash 420ms ease-out forwards;
            pointer-events: none;
        }

        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        #boot-splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05080f;
            color: #6f7f96;
            letter-spacing: 0.35em;
            font-size: 12px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 500ms ease;
            z-index: 50;
        }

        @media (prefers-reduced-motion: reduce) {
            .wood.pulse, .float-text, .ignition-flash { animation: none; }
        }
    </style>
</head>

<body>
    <canvas id="game-canvas" touch-action="none"></canvas>
    <div id="ui"></div>
    <div id="boot-splash">The First Night</div>
    <script type="module" src="/src/body/main.ts"></script>
</body>

</html>
