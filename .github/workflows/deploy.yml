name: deploy

# One stable play URL, auto-deployed on every push to main (Ops v1.2 §5 law 4).
# Per-cycle archives under /builds/<cycle-id>/ are published alongside the current build
# so any cycle can be replayed and compared.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a deploy midway; queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The gates that must hold before anything reaches the director's phone.
      - run: npm run purity
      - run: npm run typecheck
      - run: npm test

      - run: npm run build

      - name: Publish the per-cycle archives alongside the current build
        run: |
          if [ -d builds ]; then
            mkdir -p dist/builds
            cp -r builds/. dist/builds/
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
