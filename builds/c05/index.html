<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="The First Night — you wash ashore at dusk. Cold is coming." />
    <title>The First Night</title>
    <style>
        :root {
            --text: #f0ece4;
            --dim: #a9b6c6;
            --warm: #f0a860;
            --danger: #d9694a;
            --panel: rgba(9, 14, 22, 0.93);
            --edge: rgba(120, 140, 165, 0.35);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #05080f;
            overflow: hidden;
            /* A3: no pinch/zoom traps, no double-tap zoom, no pull-to-refresh. */
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            touch-action: none;
        }

        /* The UI layer is transparent to touch except where a control actually is. */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        #ui button { pointer-events: auto; }

        /* ---- HUD ---- */

        .hud { position: absolute; inset: 0; }

        /* Four compact vital bars, stacked top-left. */
        .vitals {
            position: absolute;
            top: calc(10px + var(--safe-top));
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
        }

        .vital { display: grid; grid-template-columns: 58px 1fr auto; align-items: center; gap: 7px; }
        .vital-name { font-size: 10px; letter-spacing: 0.12em; color: var(--dim); }

        .vital-bar {
            width: min(40vw, 190px);
            height: 11px;
            border: 1px solid var(--edge);
            border-radius: 3px;
            background: rgba(6, 10, 16, 0.6);
            overflow: hidden;
        }

        .vital-fill { height: 100%; width: 100%; transition: width 220ms linear, background 400ms linear; }
        .vital-label { font-size: 12px; color: var(--dim); min-width: 20px; }

        .hud-corner {
            position: absolute;
            top: calc(12px + var(--safe-top));
            right: 68px;
            text-align: right;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
        }
        .clock { font-size: 15px; font-weight: 700; color: var(--text); }

        /* The carried-inventory chip strip, below the vitals (5 rows since C05's energy). */
        .inv {
            position: absolute;
            top: calc(104px + var(--safe-top));
            left: 12px;
            right: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .chip {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            background: rgba(9, 14, 22, 0.66);
            border: 1px solid var(--edge);
            border-radius: 5px;
            padding: 2px 7px;
        }
        .chip.tool { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }
        /* Food chips are tappable — the direct-world "tap the thing to use it" for eating. */
        .chip.food { pointer-events: auto; cursor: pointer; border-color: rgba(143, 191, 122, 0.55); }
        .chip.food:active { transform: scale(0.94); }
        .chip.food::after { content: " ·eat"; color: var(--dim); font-weight: 500; }
        /* A full flask is a carried drink — tap it to sip inland. */
        .chip.tool.drink { pointer-events: auto; cursor: pointer; }
        .chip.tool.drink:active { transform: scale(0.94); }
        .chip.tool.drink::after { content: " ·drink"; color: #0c1420; opacity: 0.6; font-weight: 500; }

        .hud-bottom {
            position: absolute;
            left: 0;
            right: 14px;
            bottom: calc(18px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .goal {
            font-size: 13px;
            color: var(--dim);
            background: rgba(6, 10, 16, 0.55);
            padding: 5px 10px;
            border-radius: 5px;
            max-width: 62vw;
            text-align: right;
        }

        .action {
            min-width: 168px;
            min-height: 56px;
            padding: 0 22px;
            font: inherit;
            font-size: 18px;
            font-weight: 700;
            color: var(--dim);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }

        .action.ready { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }
        .action:active { transform: scale(0.96); }

        .action-row { display: flex; align-items: flex-end; gap: 10px; }
        .secondary-action {
            min-width: 96px;
            min-height: 52px;
            padding: 0 16px;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }
        .secondary-action:active { transform: scale(0.96); }

        .settings-button {
            position: absolute;
            top: calc(14px + var(--safe-top));
            right: 14px;
            min-width: 62px;
            min-height: 44px;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            color: var(--dim);
            background: rgba(12, 20, 32, 0.7);
            border: 1px solid var(--edge);
            border-radius: 8px;
            opacity: 0.75;
        }

        /* The controlled new-build prompt (D-014) — small, top-center, never blocks play.
           Kept away from the bottom, where every panel's action button tends to sit, so it
           can never repeat the swallowed-tap bug class the FIX 1 CSS overflow fix addressed. */
        #update-banner {
            position: fixed;
            left: 50%;
            top: calc(14px + var(--safe-top));
            transform: translateX(-50%) translateY(-12px);
            z-index: 55;
            opacity: 0;
            transition: opacity 260ms ease, transform 260ms ease;
            pointer-events: none;
        }
        #update-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #update-banner button {
            pointer-events: auto;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            color: #0c1420;
            background: var(--warm);
            border: 2px solid #ffe6a3;
            border-radius: 9px;
            padding: 8px 16px;
        }

        .hint {
            position: absolute;
            left: 50%;
            bottom: calc(160px + var(--safe-bottom));
            transform: translateX(-50%) translateY(8px);
            max-width: 78vw;
            padding: 9px 14px;
            border-radius: 7px;
            background: rgba(9, 14, 22, 0.86);
            color: var(--warm);
            font-size: 15px;
            text-align: center;
            opacity: 0;
            transition: opacity 260ms ease, transform 260ms ease;
        }

        .hint.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- Virtual stick ---- */

        .stick-base, .stick-knob {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            margin-left: -39px;
            margin-top: -39px;
            width: 78px;
            height: 78px;
            transition: opacity 160ms ease;
            pointer-events: none;
        }

        .stick-base { border: 2px solid rgba(180, 200, 220, 0.5); background: rgba(10, 16, 26, 0.28); }

        .stick-knob {
            width: 46px;
            height: 46px;
            margin-left: -23px;
            margin-top: -23px;
            background: rgba(240, 236, 228, 0.7);
        }

        /* ---- Panels ---- */

        .panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* flex-start, not center: on a short landscape viewport (D-041 pivoted the game
               to ~412px tall) a tall panel (the morning report, in particular) can be taller
               than the screen. Centered content overflows equally off BOTH edges, which sat
               the dismiss button below the visible viewport with no way to reach it (FIX 1,
               2026-07-23 handoff) -- elementFromPoint at its real screen position returned
               null, confirming nothing was covering it: it was simply never on-screen.
               flex-start plus overflow-y:auto guarantees the button is always reachable,
               scrolled to if need be, on any viewport height. */
            justify-content: flex-start;
            gap: 14px;
            padding: 28px;
            box-sizing: border-box;
            background: var(--panel);
            text-align: center;
            opacity: 0;
            transition: opacity 300ms ease;
            pointer-events: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Tighten spacing on short landscape viewports so the common case needs no scroll
           at all; overflow-y:auto above is the guaranteed fallback for anything longer. */
        @media (max-height: 480px) {
            .panel { gap: 8px; padding: 14px 28px; }
            .panel h1 { font-size: clamp(22px, 7vw, 34px); }
            .panel h2 { font-size: 20px; }
            .panel p { font-size: 15px; line-height: 1.35; }
            .panel .lines { gap: 8px; margin: 3px 0 2px; }
            .panel .primary { margin-top: 4px; min-height: 46px; }
            .build-list { gap: 8px; }
            .build-item { padding: 8px 12px; }
            .build-item h2 { font-size: 16px; }
            .build-item .primary { min-height: 40px; }
        }

        .panel.visible { opacity: 1; }
        .panel.leaving { opacity: 0; }

        .panel h1 { font-size: clamp(30px, 9vw, 46px); letter-spacing: 0.14em; margin: 0; }
        .panel h2 { font-size: 25px; margin: 0; }
        .panel p { margin: 0; line-height: 1.55; font-size: 17px; }
        .panel .subtitle { color: var(--warm); font-size: 14px; }
        .panel .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: min(320px, 80vw);
            min-height: 48px;
            padding: 0 4px;
            font-size: 16px;
        }
        .panel .toggle-row input[type="checkbox"] { width: 22px; height: 22px; }

        .panel .lines {
            text-align: left;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 6px 0 4px;
        }

        .panel .primary {
            margin-top: 10px;
            min-height: 56px;
            padding: 0 30px;
            font: inherit;
            font-size: 18px;
            font-weight: 700;
            color: #0c1420;
            background: var(--warm);
            border: 2px solid #ffe6a3;
            border-radius: 10px;
        }

        .panel .choices { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .panel .choices button {
            min-width: 104px;
            min-height: 56px;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            background: rgba(12, 20, 32, 0.85);
            border: 2px solid var(--edge);
            border-radius: 10px;
        }

        .panel .choices button.on { color: #0c1420; background: var(--warm); border-color: #ffe6a3; }
        .panel .quiet {
            margin-top: 6px;
            min-height: 48px;
            padding: 0 22px;
            font: inherit;
            font-size: 15px;
            color: var(--dim);
            background: transparent;
            border: 1px solid var(--edge);
            border-radius: 9px;
        }
        .panel .primary[disabled] { opacity: 0.5; }
        .cold-open p, .death .subtitle { color: var(--dim); }

        /* Craft card gates. */
        .gates { display: flex; flex-direction: column; gap: 8px; width: min(320px, 80vw); }
        .gate {
            display: flex;
            justify-content: space-between;
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid var(--edge);
        }
        .gate.met { color: var(--good); border-color: rgba(143, 191, 122, 0.5); }
        .gate.unmet { color: var(--danger); }
        .gate-hint { font-size: 12px; color: var(--dim); text-align: left; margin: -3px 4px 3px; }
        .death-count { color: var(--dim); font-size: 14px; }

        /* The Build panel (C05): axe / shelter / storage, each its own gated card — never a
           shared priority slot (D-040/D-042's lesson, applied up front this time). */
        .build-list { display: flex; flex-direction: column; gap: 12px; width: min(360px, 85vw); text-align: left; }
        .build-item {
            border: 1px solid var(--edge);
            border-radius: 10px;
            padding: 12px 16px;
        }
        .build-item h2 { font-size: 18px; margin: 0 0 2px; }
        .build-item .subtitle { font-size: 12px; margin: 0 0 8px; }
        .build-item .gates { width: 100%; gap: 6px; }
        .build-item .gate { padding: 6px 10px; font-size: 14px; }
        .build-item .primary { width: 100%; margin-top: 8px; min-height: 46px; }
        .build-item.done { opacity: 0.55; }
        .build-item.done .subtitle { color: var(--good); }

        /* Level-up toast. */
        .level-toast {
            position: absolute;
            left: 50%;
            top: 30%;
            transform: translate(-50%, -8px);
            text-align: center;
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(9, 14, 22, 0.9);
            border: 1px solid var(--warm);
            color: var(--text);
            font-size: 17px;
            opacity: 0;
            transition: opacity 380ms ease, transform 380ms ease;
            pointer-events: none;
        }
        .level-toast.visible { opacity: 1; transform: translate(-50%, 0); }
        .level-toast strong { color: var(--warm); }
        .level-toast span { color: var(--dim); font-size: 13px; }

        /* First-pickup identity toast — names a new resource once (D-043). */
        .pickup-toast {
            position: absolute;
            left: 50%;
            top: 22%;
            transform: translate(-50%, -8px);
            text-align: center;
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(9, 14, 22, 0.9);
            border: 1px solid rgba(143, 191, 122, 0.55);
            color: var(--text);
            font-size: 16px;
            opacity: 0;
            transition: opacity 360ms ease, transform 360ms ease;
            pointer-events: none;
        }
        .pickup-toast.visible { opacity: 1; transform: translate(-50%, 0); }
        .pickup-toast strong { color: var(--warm); }
        .pickup-toast span { color: var(--dim); font-size: 12px; }

        /* ---- Rotate-to-landscape prompt (D-041) ---- */
        #rotate-prompt {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
            padding: 24px;
            background: #05080f;
            color: var(--text);
            z-index: 60;
        }
        #rotate-prompt.show { display: flex; }
        #rotate-prompt .rotate-icon {
            font-size: 54px;
            color: var(--warm);
            animation: rotate-hint 2.4s ease-in-out infinite;
        }
        #rotate-prompt p { margin: 0; font-size: 20px; font-weight: 700; }
        #rotate-prompt span { color: var(--dim); font-size: 14px; }
        @keyframes rotate-hint {
            0%, 40% { transform: rotate(0deg); }
            60%, 100% { transform: rotate(90deg); }
        }

        /* ---- Transient feedback ---- */

        .float-text {
            position: absolute;
            left: 50%;
            top: 46%;
            transform: translate(-50%, 0);
            font-size: 19px;
            font-weight: 700;
            color: var(--warm);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
            animation: rise 900ms ease-out forwards;
            pointer-events: none;
        }

        @keyframes rise {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            18% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -46px); }
        }

        .ignition-flash {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 58%, rgba(255, 214, 140, 0.55), rgba(255, 150, 60, 0) 62%);
            animation: flash 420ms ease-out forwards;
            pointer-events: none;
        }

        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        #boot-splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05080f;
            color: #6f7f96;
            letter-spacing: 0.35em;
            font-size: 12px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 500ms ease;
            z-index: 50;
        }

        @media (prefers-reduced-motion: reduce) {
            .wood.pulse, .float-text, .ignition-flash, #rotate-prompt .rotate-icon { animation: none; }
        }
    </style>
  <script type="module" crossorigin src="./assets/index-BTG06A68.js"></script>

<body>
    <canvas id="game-canvas" touch-action="none"></canvas>
    <div id="ui"></div>
    <div id="boot-splash">The First Night</div>
</body>

</html>
